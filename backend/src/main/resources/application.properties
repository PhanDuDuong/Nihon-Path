spring.application.name=japanese-backend
spring.config.import=optional:file:D:/secrets/japanese-learning.properties,optional:file:D:/secrets/vnpay.properties
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/japanese_learning_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

server.port=${PORT:8080}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://nihonpath-zeta.vercel.app}
app.upload-dir=${APP_UPLOAD_DIR:../uploads}
dictionary.import=${DICTIONARY_IMPORT:false}
dictionary.import.force=false
dictionary.import.min-vocabularies=100000
dictionary.import.min-kanjis=10000
dictionary.jmdict-path=${DICTIONARY_JMDICT_PATH:data/dictionary/JMdict_e}
dictionary.kanjidic-path=${DICTIONARY_KANJIDIC_PATH:data/dictionary/kanjidic2.xml}
dictionary.kanjidictvn.enabled=${DICTIONARY_KANJIDICTVN_ENABLED:false}
dictionary.kanjidictvn-path=${DICTIONARY_KANJIDICTVN_PATH:data/dictionary/kanjidictvn/out_vn}
gemini.api-key=${GEMINI_API_KEY:${gemini.secret-api-key:}}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.fallback-models=${GEMINI_FALLBACK_MODELS:gemini-flash-lite-latest,gemini-2.5-flash-lite,gemini-flash-latest}
gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
jwt.secret=${JWT_SECRET:change-me-local-jwt-secret}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
